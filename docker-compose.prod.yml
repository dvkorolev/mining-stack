# Production docker-compose for Raspberry Pi
# Uses pre-built images from GitHub Container Registry

services:
  # Python Collector Service V2 - Direct Prometheus metrics
  python-scheduler:
    image: ghcr.io/${GITHUB_REPOSITORY:-dvkorolev/mining-stack}/python-scheduler:${IMAGE_TAG:-latest}
    platform: linux/arm64
    ports:
      - "8000:8000"
    environment:
      - MINERS_CONFIG=/app/etc/miners.yaml
      - COLLECTION_INTERVAL=2  # minutes
    volumes:
      - ./etc:/app/etc
    networks:
      - mining-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-dvkorolev/mining-stack}/frontend:${IMAGE_TAG:-latest}
    platform: linux/arm64
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mining-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-dvkorolev/mining-stack}/backend:${IMAGE_TAG:-latest}
    platform: linux/arm64
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - LOG_LEVEL=debug
      - CORS_ORIGIN=*
      - MINER_CONFIG_PATH=/opt/mining-stack/etc/miners.yaml
      - DATA_DIR=/app/data
      - JOB_RUNNER_URL=http://python-scheduler:8000
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./etc:/opt/mining-stack/etc
      - ./bin:/opt/mining-stack/bin:ro
      - ./venv:/opt/mining-stack/venv:ro
    depends_on:
      python-scheduler:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    restart: unless-stopped
    networks:
      - mining-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    platform: linux/arm64
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - mining-network
    restart: unless-stopped

  # Note: node-exporter removed in V2 - metrics served directly by python-scheduler

  alertmanager:
    image: prom/alertmanager:latest
    platform: linux/arm64
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./docker/alertmanager:/etc/alertmanager
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    networks:
      - mining-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    platform: linux/arm64
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=mining123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/mining-overview.json
    depends_on:
      - prometheus
    networks:
      - mining-network
    restart: unless-stopped

networks:
  mining-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana-storage:
  alertmanager_data:
  # Note: metrics-data volume removed in V2 - metrics served directly from memory
