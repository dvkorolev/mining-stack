# Production docker-compose for Raspberry Pi
# Pulls images from Mac registry at 100.121.189.88:5001
# Usage: docker compose -f docker-compose.prod.yml up -d
# With logging: docker compose -f docker-compose.prod.yml -f docker-compose.logging.yml up -d

services:
  # Python Collector Service V3 - APScheduler + State Persistence
  python-scheduler:
    image: 100.121.189.88:5001/python-scheduler:latest
    platform: linux/arm64
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - MINERS_CONFIG=/app/etc/miners.yaml
      - POOLS_CONFIG=/app/etc/pools.yaml
      - COLLECTION_INTERVAL=${COLLECTION_INTERVAL:-2}
      - POOL_TEST_INTERVAL=${POOL_TEST_INTERVAL:-5}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - BACKEND_URL=http://backend:5000
      - PUSH_TO_BACKEND=${PUSH_TO_BACKEND:-true}
      - SYSTEM_API_KEY=${SYSTEM_API_KEY:-}
      - USE_DATABASE_CONFIG=${USE_DATABASE_CONFIG:-true}
    volumes:
      - ./etc:/app/etc
      - ./data/python-scheduler:/app/data
    networks:
      - mining-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: 100.121.189.88:5001/frontend:latest
    platform: linux/arm64
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mining-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: 100.121.189.88:5001/backend:latest
    platform: linux/arm64
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-5000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - MINER_CONFIG_PATH=/opt/mining-stack/etc/miners.yaml
      - DATA_DIR=/app/data
      - JOB_RUNNER_URL=http://python-scheduler:8000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - ADMIN_TELEGRAM_CHAT_ID=${ADMIN_TELEGRAM_CHAT_ID:-}
      - SYSTEM_API_KEY=${SYSTEM_API_KEY:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./etc:/opt/mining-stack/etc
      - ./bin:/opt/mining-stack/bin:ro
      - ./venv:/opt/mining-stack/venv:ro
      - ./docker/prometheus/rules:/app/prometheus-rules
    depends_on:
      python-scheduler:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    restart: unless-stopped
    networks:
      - mining-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    platform: linux/arm64
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus:/etc/prometheus
      - ./docker/prometheus/targets:/etc/prometheus/targets:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - mining-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    platform: linux/arm64
    container_name: blackbox-exporter
    ports:
      - "9115:9115"
    volumes:
      - ./docker/blackbox:/etc/blackbox_exporter
    command:
      - '--config.file=/etc/blackbox_exporter/blackbox.yml'
    networks:
      - mining-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9115/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:latest
    platform: linux/arm64
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./docker/alertmanager:/etc/alertmanager
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    networks:
      - mining-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    platform: linux/arm64
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=mining123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/mining-overview.json
    depends_on:
      - prometheus
    networks:
      - mining-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mining-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana-storage:
  alertmanager_data:
