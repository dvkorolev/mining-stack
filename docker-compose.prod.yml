# Production docker-compose for Raspberry Pi
# Uses pre-built images from GitHub Container Registry

services:
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-dvkorolev/mining-stack}/frontend:${IMAGE_TAG:-latest}
    platform: linux/arm64
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mining-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-dvkorolev/mining-stack}/backend:${IMAGE_TAG:-latest}
    platform: linux/arm64
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - LOG_LEVEL=info
      - CORS_ORIGIN=*
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    restart: unless-stopped
    networks:
      - mining-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    platform: linux/arm64
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - mining-network
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    platform: linux/arm64
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - mining-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    platform: linux/arm64
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=mining123
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - mining-network
    restart: unless-stopped

networks:
  mining-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana-storage:
