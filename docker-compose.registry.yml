# Local Docker Registry on Mac
# Run this on your Mac to host the registry
# Usage: docker compose -f docker-compose.registry.yml up -d

services:
  registry:
    image: registry:2
    container_name: local-registry
    ports:
      - "0.0.0.0:5001:5000"  # Explicitly bind to all interfaces
    volumes:
      - registry-data:/var/lib/registry
    restart: unless-stopped
    environment:
      - REGISTRY_STORAGE_DELETE_ENABLED=true
      - REGISTRY_HTTP_ADDR=0.0.0.0:5000  # Listen on all interfaces
      - REGISTRY_HTTP_HOST=http://0.0.0.0:5001
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/v2/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  registry-data:
    driver: local
