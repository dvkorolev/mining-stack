# Docker Compose configuration for logging stack (Loki + Promtail)
# This extends docker-compose.prod.yml
# Usage: docker compose -f docker-compose.prod.yml -f docker-compose.logging.yml up
#
# IMPORTANT: This file extends services from docker-compose.prod.yml
# It does NOT redefine them, only adds configuration

services:
  # Loki - Log aggregation database
  loki:
    image: grafana/loki:2.9.0
    platform: linux/arm64
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - loki-data:/loki
      - ./docker/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    networks:
      - mining-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Promtail - Log collector
  promtail:
    image: grafana/promtail:2.9.0
    platform: linux/arm64
    container_name: promtail
    ports:
      - "9080:9080"
    volumes:
      # Docker socket to read container logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Promtail configuration
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - mining-network
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    restart: unless-stopped
    # No Docker healthcheck: the grafana/promtail image ships no wget/curl/shell, so any
    # CMD HTTP probe false-fails as "unhealthy" forever (DMI-15). Liveness is observable
    # via promtail's own /metrics (scraped by Prometheus) and Loki target status instead.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Python Scheduler - Updated with logging configuration
  python-scheduler:
    environment:
      # Enable JSON logging for Loki
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
    labels:
      # Promtail will collect logs from containers with this label
      logging: "promtail"
    healthcheck:
      # Smart health check
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend - Updated with logging configuration
  backend:
    environment:
      # Enable JSON logging for Loki
      - LOG_FORMAT=json
      - LOG_LEVEL=info
    labels:
      # Promtail will collect logs from containers with this label
      logging: "promtail"
    healthcheck:
      # Use wget since curl is not available in the backend container
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Frontend - Updated with logging configuration
  frontend:
    environment:
      # Frontend logging configuration
      - REACT_APP_LOG_LEVEL=INFO
      - REACT_APP_SEND_LOGS_TO_BACKEND=false
    labels:
      # Promtail will collect logs from containers with this label
      logging: "promtail"

  # Grafana - Updated to include Loki data source
  grafana:
    environment:
      # Auto-provision Loki data source
      - GF_DATASOURCES_DEFAULT_URL=http://loki:3100
    volumes:
      # Grafana provisioning for Loki data source (consolidated with main config)
      - ./docker/grafana/provisioning/datasources/loki.yml:/etc/grafana/provisioning/datasources/loki.yml:ro

volumes:
  loki-data:
    driver: local
