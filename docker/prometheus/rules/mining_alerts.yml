groups:
  - name: mining_critical
    interval: 30s
    rules:
      # Critical: Miner is offline
      - alert: MinerOffline
        expr: miner_scrape_success == 0
        for: 5m
        labels:
          severity: critical
          component: miner
        annotations:
          summary: "Miner {{ $labels.name }} is offline"
          description: "Miner {{ $labels.name }} ({{ $labels.ip }}) has been unreachable for 5 minutes."
          
      # Critical: High temperature
      - alert: MinerHighTemperature
        expr: miner_temp_max_c > 85
        for: 2m
        labels:
          severity: critical
          component: miner
        annotations:
          summary: "Miner {{ $labels.name }} temperature critical"
          description: "Miner {{ $labels.name }} temperature is {{ $value }}°C (threshold: 85°C)"
          
      # Critical: Miner stopped mining
      - alert: MinerNotMining
        expr: miner_is_mining == 0 and miner_scrape_success == 1
        for: 5m
        labels:
          severity: critical
          component: miner
        annotations:
          summary: "Miner {{ $labels.name }} stopped mining"
          description: "Miner {{ $labels.name }} is online but not mining for 5 minutes."
          
      # Critical: Hashrate dropped significantly (50% below expected) - SHA-256
      - alert: MinerHashrateCriticalSHA256
        expr: |
          (
            miner_hashrate_ths{algorithm="sha256"} < (miner_expected_hashrate_ths * 0.5)
            and miner_is_mining{algorithm="sha256"} == 1
            and miner_expected_hashrate_ths > 0
          )
        for: 10m
        labels:
          severity: critical
          component: miner
          algorithm: sha256
        annotations:
          summary: "Miner {{ $labels.name }} (SHA-256) hashrate critically low"
          description: "Miner {{ $labels.name }} hashrate is {{ $value | printf \"%.1f\" }} TH/s (expected: {{ $labels.expected_hashrate }} TH/s, threshold: 50% below)"
      
      # Critical: Hashrate dropped significantly (50% below expected) - SCRYPT
      - alert: MinerHashrateCriticalSCRYPT
        expr: |
          (
            miner_hashrate_mhs{algorithm="scrypt"} < 10000
            and miner_is_mining{algorithm="scrypt"} == 1
          )
        for: 10m
        labels:
          severity: critical
          component: miner
          algorithm: scrypt
        annotations:
          summary: "Miner {{ $labels.name }} (SCRYPT) hashrate critically low"
          description: "Miner {{ $labels.name }} hashrate is {{ $value | printf \"%.1f\" }} MH/s (threshold: 10000 MH/s)"

  - name: mining_warning
    interval: 30s
    rules:
      # Warning: Temperature elevated
      - alert: MinerTemperatureHigh
        expr: miner_temp_max_c > 75 and miner_temp_max_c <= 85
        for: 5m
        labels:
          severity: warning
          component: miner
        annotations:
          summary: "Miner {{ $labels.name }} temperature elevated"
          description: "Miner {{ $labels.name }} temperature is {{ $value }}°C (warning threshold: 75°C)"
          
      # Warning: Hashrate below expected (20% below expected) - SHA-256
      - alert: MinerHashrateWarningSHA256
        expr: |
          (
            miner_hashrate_ths{algorithm="sha256"} < (miner_expected_hashrate_ths * 0.8)
            and miner_hashrate_ths{algorithm="sha256"} >= (miner_expected_hashrate_ths * 0.5)
            and miner_is_mining{algorithm="sha256"} == 1
            and miner_expected_hashrate_ths > 0
          )
        for: 10m
        labels:
          severity: warning
          component: miner
          algorithm: sha256
        annotations:
          summary: "Miner {{ $labels.name }} (SHA-256) hashrate below expected"
          description: "Miner {{ $labels.name }} hashrate is {{ $value | printf \"%.1f\" }} TH/s (expected: {{ $labels.expected_hashrate }} TH/s, threshold: 20% below)"
      
      # Warning: Hashrate below expected - SCRYPT
      - alert: MinerHashrateWarningSCRYPT
        expr: |
          (
            miner_hashrate_mhs{algorithm="scrypt"} < 20000
            and miner_hashrate_mhs{algorithm="scrypt"} >= 10000
            and miner_is_mining{algorithm="scrypt"} == 1
          )
        for: 10m
        labels:
          severity: warning
          component: miner
          algorithm: scrypt
        annotations:
          summary: "Miner {{ $labels.name }} (SCRYPT) hashrate below expected"
          description: "Miner {{ $labels.name }} hashrate is {{ $value | printf \"%.1f\" }} MH/s (warning threshold: 20000 MH/s)"
          
      # Warning: Elevated rejection rate (2-5%)
      - alert: MinerRejectionRateWarning
        expr: |
          (
            rate(miner_pool_rejected_total[5m]) / 
            (rate(miner_pool_accepted_total[5m]) + rate(miner_pool_rejected_total[5m]))
          ) > 0.02 and (
            rate(miner_pool_rejected_total[5m]) / 
            (rate(miner_pool_accepted_total[5m]) + rate(miner_pool_rejected_total[5m]))
          ) <= 0.05
        for: 10m
        labels:
          severity: warning
          component: miner
        annotations:
          summary: "Miner {{ $labels.name }} elevated rejection rate"
          description: "Miner {{ $labels.name }} rejection rate is {{ $value | humanizePercentage }} (warning threshold: 2%)"
          
      # Critical: High rejection rate (>5%)
      - alert: MinerRejectionRateCritical
        expr: |
          (
            rate(miner_pool_rejected_total[5m]) / 
            (rate(miner_pool_accepted_total[5m]) + rate(miner_pool_rejected_total[5m]))
          ) > 0.05
        for: 10m
        labels:
          severity: critical
          component: miner
        annotations:
          summary: "Miner {{ $labels.name }} high rejection rate"
          description: "Miner {{ $labels.name }} rejection rate is {{ $value | humanizePercentage }} (critical threshold: 5%)"
          
      # Warning: Fault light on
      - alert: MinerFaultLight
        expr: miner_fault_light_on == 1
        for: 2m
        labels:
          severity: warning
          component: miner
        annotations:
          summary: "Miner {{ $labels.name }} fault light active"
          description: "Miner {{ $labels.name }} has fault light indicator on."
          
      # Warning: Errors detected
      - alert: MinerErrors
        expr: miner_errors_count > 0
        for: 5m
        labels:
          severity: warning
          component: miner
        annotations:
          summary: "Miner {{ $labels.name }} reporting errors"
          description: "Miner {{ $labels.name }} has {{ $value }} error(s)."
          
      # Warning: Missing chips on hashboard
      - alert: MinerMissingChips
        expr: |
          miner_board_chips_count < on(ip, name, slot) group_left() miner_board_chips_expected
        for: 10m
        labels:
          severity: warning
          component: miner
        annotations:
          summary: "Miner {{ $labels.name }} missing chips on board {{ $labels.slot }}"
          description: "Board {{ $labels.slot }} has {{ $value | printf \"%.0f\" }} chips (expected: {{ with query (printf \"miner_board_chips_expected{name='%s',slot='%s'}\" $labels.name $labels.slot) }}{{ . | first | value | printf \"%.0f\" }}{{ end }})"
          
      # Warning: Fan speed low (below 3000 RPM)
      - alert: MinerFanSpeedWarning
        expr: miner_fan_speed_rpm < 3000 and miner_fan_speed_rpm >= 2000 and miner_is_mining == 1
        for: 5m
        labels:
          severity: warning
          component: miner
        annotations:
          summary: "Miner {{ $labels.name }} fan speed low"
          description: "Fan {{ $labels.fan_id }} speed is {{ $value | printf \"%.0f\" }} RPM (warning threshold: 3000 RPM)"
          
      # Critical: Fan speed critically low (below 2000 RPM)
      - alert: MinerFanSpeedCritical
        expr: miner_fan_speed_rpm < 2000 and miner_is_mining == 1
        for: 2m
        labels:
          severity: critical
          component: miner
        annotations:
          summary: "Miner {{ $labels.name }} fan speed critically low"
          description: "Fan {{ $labels.fan_id }} speed is {{ $value | printf \"%.0f\" }} RPM (critical threshold: 2000 RPM)"
          
      # Warning: Poor efficiency
      - alert: MinerPoorEfficiency
        expr: miner_efficiency_j_th > 35
        for: 15m
        labels:
          severity: warning
          component: miner
        annotations:
          summary: "Miner {{ $labels.name }} poor efficiency"
          description: "Miner {{ $labels.name }} efficiency is {{ $value }} J/TH (threshold: 35 J/TH)"

  - name: mining_farm
    interval: 30s
    rules:
      # Farm-wide: Multiple miners offline
      - alert: FarmMultipleMinersOffline
        expr: count(miner_scrape_success == 0) > 3
        for: 5m
        labels:
          severity: critical
          component: farm
        annotations:
          summary: "Multiple miners offline"
          description: "{{ $value }} miners are currently offline."
          
      # Farm-wide: Total hashrate drop - SHA-256
      - alert: FarmHashrateDropSHA256
        expr: |
          (
            sum(miner_hashrate_ths{algorithm="sha256"}) < 1500
            and count(miner_is_mining{algorithm="sha256"} == 1) > 10
          )
        for: 10m
        labels:
          severity: critical
          component: farm
          algorithm: sha256
        annotations:
          summary: "Farm SHA-256 hashrate critically low"
          description: "Total SHA-256 farm hashrate is {{ $value }} TH/s (expected >1500 TH/s with 10+ miners)"
      
      # Farm-wide: Total hashrate drop - SCRYPT
      - alert: FarmHashrateDropSCRYPT
        expr: |
          (
            sum(miner_hashrate_mhs{algorithm="scrypt"}) < 10000
            and count(miner_is_mining{algorithm="scrypt"} == 1) > 0
          )
        for: 10m
        labels:
          severity: critical
          component: farm
          algorithm: scrypt
        annotations:
          summary: "Farm SCRYPT hashrate critically low"
          description: "Total SCRYPT farm hashrate is {{ $value }} MH/s (expected >10000 MH/s)"
          
      # Farm-wide: High average temperature
      - alert: FarmHighTemperature
        expr: avg(miner_temp_max_c) > 80
        for: 10m
        labels:
          severity: warning
          component: farm
        annotations:
          summary: "Farm average temperature high"
          description: "Average temperature across all miners is {{ $value }}°C"
          
      # Farm-wide: High power consumption
      - alert: FarmHighPowerConsumption
        expr: sum(miner_power_watts) > 70000
        for: 5m
        labels:
          severity: warning
          component: farm
        annotations:
          summary: "Farm power consumption high"
          description: "Total power consumption is {{ $value }}W (70kW threshold)"

  - name: system
    interval: 30s
    rules:
      # System: High CPU usage
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}%"
          
      # System: High memory usage
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value }}%"
          
      # System: Low disk space
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk space available: {{ $value }}%"
