# Prometheus Configuration V2
# Direct scraping from Python Collector Service (no Node Exporter)

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  scrape_timeout: 10s

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "/etc/prometheus/rules/mining_alerts.yml"
  - "/etc/prometheus/rules/pool_network_alerts.yml"

# Scrape configurations
scrape_configs:
  # Mining metrics - Direct scrape from Python Collector Service
  - job_name: 'mining'
    static_configs:
      - targets: ['python-scheduler:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_labels: true
    
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s

  # Grafana monitoring (optional)
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    scrape_interval: 60s
    metrics_path: '/metrics'
