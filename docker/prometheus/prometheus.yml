global:
  scrape_interval: 30s
  evaluation_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter for system metrics
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Textfile collector for miner metrics
  - job_name: "node-textfile"
    static_configs:
      - targets: ["node-exporter:9100"]
    metrics_path: /metrics
    params:
      collect[]: ["textfile"]

  # Backend API metrics
  - job_name: "backend"
    static_configs:
      - targets: ["backend:5000"]
    metrics_path: /metrics
