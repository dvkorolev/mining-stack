global:
  scrape_interval: 30s
  evaluation_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Mining metrics - Direct scrape from Python Collector Service (V2)
  - job_name: "mining"
    static_configs:
      - targets: ["python-scheduler:8000"]
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # Backend API metrics
  - job_name: "backend"
    static_configs:
      - targets: ["backend:5000"]
    metrics_path: /metrics
