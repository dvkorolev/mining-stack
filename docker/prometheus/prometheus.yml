global:
  scrape_interval: 30s
  evaluation_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Mining metrics - Direct scrape from Python Collector Service (V2)
  - job_name: "mining"
    static_configs:
      - targets: ["python-scheduler:8000"]
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # Backend API metrics
  - job_name: "backend"
    static_configs:
      - targets: ["backend:5000"]
    metrics_path: /metrics

  # Blackbox Exporter - TCP checks for mining pools
  - job_name: 'blackbox-tcp'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    file_sd_configs:
      - files:
        - /etc/prometheus/targets/pools.json
        refresh_interval: 5m
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
