global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job']
  group_wait: 10s  # Reduced from 30s for faster notifications
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'
  routes:
    # Critical alerts go to both webhook and Telegram
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true
    # All alerts go to webhook
    - match_re:
        alertname: '.*'
      receiver: 'webhook-receiver'

receivers:
- name: 'default-receiver'
  webhook_configs:
  - url: 'http://backend:5000/api/alerts/webhook'
    send_resolved: true
    http_config:
      follow_redirects: true

- name: 'webhook-receiver'
  webhook_configs:
  - url: 'http://backend:5000/api/alerts/webhook'
    send_resolved: true
    http_config:
      follow_redirects: true

- name: 'critical-receiver'
  # Telegram notifications (configure in alertmanager.telegram.yml if needed)
  # See alertmanager.telegram.yml.example for Telegram setup
  webhook_configs:
  - url: 'http://backend:5000/api/alerts/webhook'
    send_resolved: true
    http_config:
      follow_redirects: true
