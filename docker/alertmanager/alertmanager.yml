global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'telegram-notifications'

receivers:
- name: 'telegram-notifications'
  telegram_configs:
  - bot_token: '${TELEGRAM_BOT_TOKEN}'
    chat_id: ${TELEGRAM_CHAT_ID}
    parse_mode: 'HTML'
    message: |
      {{ range .Alerts }}
      <b>{{ if eq .Status "firing" }}🔥 ALERT{{ else }}✅ RESOLVED{{ end }}</b>: {{ .Labels.alertname }}
      {{ if .Labels.miner }}<b>Miner:</b> <code>{{ .Labels.miner }}</code>
      {{ else if .Labels.instance }}<b>Instance:</b> <code>{{ .Labels.instance }}</code>
      {{ end }}<b>Job:</b> {{ .Labels.job }}
      <b>Summary:</b> {{ .Annotations.summary }}
      <b>Description:</b> {{ .Annotations.description }}
      {{ end }}
