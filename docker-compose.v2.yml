# Production docker-compose V2 for Raspberry Pi
# Uses direct Prometheus scraping (no Node Exporter)

services:
  # Python Collector Service V2 - Direct Prometheus metrics
  python-scheduler:
    image: ghcr.io/${GITHUB_REPOSITORY:-dvkorolev/mining-stack}/python-scheduler:${IMAGE_TAG:-latest}
    platform: linux/arm64
    ports:
      - "8000:8000"
    environment:
      - MINERS_CONFIG=/app/etc/miners.yaml
      - COLLECTION_INTERVAL=2  # minutes
    volumes:
      - ./etc:/app/etc
      # Note: No /metrics volume needed - metrics served directly!
    networks:
      - mining-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-dvkorolev/mining-stack}/frontend:${IMAGE_TAG:-latest}
    platform: linux/arm64
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mining-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-dvkorolev/mining-stack}/backend:${IMAGE_TAG:-latest}
    platform: linux/arm64
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - MINERS_CONFIG=/app/etc/miners.yaml
      - JOB_RUNNER_URL=http://python-scheduler:8000
    volumes:
      - ./etc:/app/etc
    networks:
      - mining-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    platform: linux/arm64
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - mining-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    platform: linux/arm64
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/mining-overview.json
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/etc/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - mining-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # NOTE: Node Exporter removed in V2 - metrics served directly by python-scheduler

networks:
  mining-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  # Note: metrics-data volume removed - no longer needed!
