# ASIC Profile Library
# The "constitution" for miner collection - defines how to talk to each miner type
#
# This is a community-driven database of ASIC knowledge.
# To add a new miner: just add a profile here, no code changes needed!

profiles:
  # ============================================================================
  # Whatsminer Family (MicroBT)
  # ============================================================================
  
  whatsminer_m50s:
    name: "Whatsminer M50S Series"
    manufacturer: "MicroBT"
    algorithm: "sha256"
    
    # Matching rules (self-contained)
    match:
      # Exact model strings
      exact:
        - "Whatsminer M50S"
        - "Whatsminer M50S+"
        - "Whatsminer M50S++"
        - "Whatsminer M50S VL30"
        - "Whatsminer M50S++ VL30"
      # Regex patterns
      patterns:
        - "^Whatsminer M50S"
        - "M50S.*(VL30|VL20)"
    
    # Collection strategy (ordered by preference)
    drivers:
      - type: "pyasic"
        priority: 1
        config:
          api_port: 4028
          timeout: 10
      - type: "cgminer"
        priority: 2
        config:
          api_port: 4028
          timeout: 10
    
    # Parser configuration
    parser:
      type: "whatsminer"
      quirks:
        # Field name says "MHS av" but value is actually in TH/s
        hashrate_field: "MHS av"
        hashrate_unit: "TH/s"  # Ignore field name, use this
        hashrate_scale: 1.0     # No conversion needed
        
        # Temperature from board sensors (more reliable than chip temps)
        temp_source: "board"
        temp_fields: ["Temperature"]  # DEVS[*].Temperature
        
        # Power reporting
        power_field: "Power"
        power_unit: "W"
    
    # Default credentials
    credentials:
      username: "admin"
      password: "admin"
    
    # Expected performance (for anomaly detection)
    expected:
      hashrate_min: 100  # TH/s
      hashrate_max: 160  # TH/s
      power_min: 3000    # W
      power_max: 3800    # W
      temp_max: 85       # °C

  whatsminer_m30s:
    name: "Whatsminer M30S Series"
    manufacturer: "MicroBT"
    algorithm: "sha256"
    
    # Matching rules
    match:
      exact:
        - "Whatsminer M30S"
        - "Whatsminer M30S+"
        - "Whatsminer M30S++"
      patterns:
        - "^Whatsminer M30S"
    
    drivers:
      - type: "pyasic"
        priority: 1
        config:
          api_port: 4028
          timeout: 10
      - type: "cgminer"
        priority: 2
        config:
          api_port: 4028
          timeout: 10
    
    parser:
      type: "whatsminer"
      quirks:
        hashrate_field: "MHS av"
        hashrate_unit: "TH/s"
        hashrate_scale: 1.0
        temp_source: "board"
        temp_fields: ["Temperature"]
        power_field: "Power"
        power_unit: "W"
    
    credentials:
      username: "admin"
      password: "admin"
    
    expected:
      hashrate_min: 80
      hashrate_max: 120
      power_min: 2800
      power_max: 3500
      temp_max: 85

  # ============================================================================
  # Antminer Family (Bitmain)
  # ============================================================================
  
  antminer_s19:
    name: "Antminer S19 Series"
    manufacturer: "Bitmain"
    algorithm: "sha256"
    
    # Matching rules
    match:
      exact:
        - "Antminer S19"
        - "Antminer S19 Pro"
        - "Antminer S19j Pro"
        - "Antminer S19 XP"
        - "Antminer S19k Pro"
        - "S19 (Stock)"
        - "S19 Pro (Stock)"
        - "S19K Pro (Stock)"
        - "S19j Pro (Stock)"
      patterns:
        - "^Antminer S19"
        - "^S19"
        - "S19.*(Pro|XP|j Pro|k Pro|K Pro)"
    
    drivers:
      - type: "pyasic"
        priority: 1
        config:
          api_port: 4028
          timeout: 10
      - type: "cgminer"
        priority: 2
        config:
          api_port: 4028
          timeout: 10
      - type: "antminer_cgi"
        priority: 3
        config:
          endpoint: "/cgi-bin/stats.cgi"
          timeout: 10
          auth_type: "digest"
    
    parser:
      type: "antminer"
      quirks:
        hashrate_field: "MHS av"
        hashrate_unit: "TH/s"
        hashrate_scale: 1.0
        temp_source: "chip"
        temp_fields: ["temp", "temp2_", "temp_chip"]
        power_field: "Power"
        power_unit: "W"
    
    credentials:
      username: "root"
      password: "root"
    
    expected:
      hashrate_min: 90
      hashrate_max: 140
      power_min: 3000
      power_max: 3500
      power_typical: 3250  # Typical power consumption when not reported by API
      temp_max: 90
    
    # Model-specific power values (used when API doesn't report power)
    model_power:
      "S19": 3250
      "S19 Pro": 3250
      "S19K Pro": 3150
      "S19j Pro": 3100
      "S19 XP": 3010

  antminer_s17:
    name: "Antminer S17 Series"
    manufacturer: "Bitmain"
    algorithm: "sha256"
    
    # Matching rules
    match:
      exact:
        - "Antminer S17"
        - "Antminer S17 Pro"
        - "Antminer S17+"
      patterns:
        - "^Antminer S17"
        - 'S17.*(Pro|\+)'
    
    drivers:
      - type: "pyasic"
        priority: 1
        config:
          api_port: 4028
          timeout: 10
      - type: "cgminer"
        priority: 2
        config:
          api_port: 4028
          timeout: 10
      - type: "antminer_cgi"
        priority: 3
        config:
          endpoint: "/cgi-bin/stats.cgi"
          timeout: 10
          auth_type: "digest"
    
    parser:
      type: "antminer"
      quirks:
        hashrate_field: "MHS av"
        hashrate_unit: "TH/s"
        hashrate_scale: 1.0
        temp_source: "chip"
        temp_fields: ["temp", "temp2_", "temp_chip"]
        power_field: "Power"
        power_unit: "W"
    
    credentials:
      username: "root"
      password: "root"
    
    expected:
      hashrate_min: 50
      hashrate_max: 70
      power_min: 2000
      power_max: 2800
      temp_max: 90

  # ============================================================================
  # SCRYPT Miners
  # ============================================================================
  
  elphapex_dg1:
    name: "ElphaPex DG1/DG1+"
    manufacturer: "ElphaPex"
    algorithm: "scrypt"
    
    # Matching rules
    match:
      exact:
        - "ElphaPex DG1"
        - "ElphaPex DG1+"
        - "ElphaPex DG1 Pro"
        - "DG1"
        - "DG1+"
        - "DG1+ (Stock)"
      patterns:
        - '\bDG1\+?\b'
        - "ElphaPex.*DG1"
        - "DG1.*Stock"
    
    drivers:
      - type: "dg1_http"
        priority: 1
        config:
          endpoints:
            stats: "/cgi-bin/stats.cgi"
            pools: "/cgi-bin/pools.cgi"
            summary: "/cgi-bin/summary.cgi"
          timeout: 10
          auth_type: "basic"
      - type: "dg1_tcp"
        priority: 2
        config:
          port: 4028
          timeout: 10
          protocol: "custom_tcp"
    
    parser:
      type: "dg1"
      quirks:
        hashrate_field: "rate_5s"
        hashrate_unit: "MH/s"  # DG1 reports in MH/s (SCRYPT)
        hashrate_scale: 1.0    # Keep as MH/s, will be converted to GH/s by collector
        temp_source: "chip"
        temp_fields: ["temp_chip"]
        temp_scale: 0.001      # Temperature in millidegrees (64125 = 64.125°C)
        power_field: "power"
        power_unit: "W"
    
    credentials:
      username: "root"
      password: "root"
    
    expected:
      hashrate_min: 10000    # 10 GH/s = 10,000 MH/s
      hashrate_max: 90000    # 90 GH/s = 90,000 MH/s (DG1+ can do ~80 GH/s)
      power_min: 3200
      power_max: 3800
      power_typical: 3400    # Typical power consumption for DG1+
      temp_max: 80

  antminer_l7:
    name: "Antminer L7"
    manufacturer: "Bitmain"
    algorithm: "scrypt"
    
    # Matching rules
    match:
      exact:
        - "Antminer L7"
        - "Antminer L7+"
      patterns:
        - '\bL7\+?\b'
        - "^Antminer L7"
    
    drivers:
      - type: "pyasic"
        priority: 1
        config:
          api_port: 4028
          timeout: 10
      - type: "cgminer"
        priority: 2
        config:
          api_port: 4028
          timeout: 10
    
    parser:
      type: "antminer"
      quirks:
        hashrate_field: "MHS av"
        hashrate_unit: "GH/s"
        hashrate_scale: 0.001
        temp_source: "chip"
        temp_fields: ["temp", "temp2_", "temp_chip"]
        power_field: "Power"
        power_unit: "W"
    
    credentials:
      username: "root"
      password: "root"
    
    expected:
      hashrate_min: 0.008  # 8 GH/s
      hashrate_max: 0.010  # 10 GH/s
      power_min: 3200
      power_max: 3600
      temp_max: 85

  antminer_l3:
    name: "Antminer L3+"
    manufacturer: "Bitmain"
    algorithm: "scrypt"
    
    # Matching rules
    match:
      exact:
        - "Antminer L3+"
        - "Antminer L3++"
      patterns:
        - '\bL3\+{1,2}\b'
        - "^Antminer L3"
    
    drivers:
      - type: "pyasic"
        priority: 1
        config:
          api_port: 4028
          timeout: 10
      - type: "cgminer"
        priority: 2
        config:
          api_port: 4028
          timeout: 10
    
    parser:
      type: "antminer"
      quirks:
        hashrate_field: "MHS av"
        hashrate_unit: "MH/s"  # Old hardware, actual MH/s
        hashrate_scale: 0.000001  # Convert to TH/s
        temp_source: "chip"
        temp_fields: ["temp"]
        power_field: "Power"
        power_unit: "W"
    
    credentials:
      username: "root"
      password: "root"
    
    expected:
      hashrate_min: 0.0005  # 500 MH/s
      hashrate_max: 0.0006  # 600 MH/s
      power_min: 700
      power_max: 900
      temp_max: 75

# ============================================================================
# Notes
# ============================================================================
# Each profile is self-contained with embedded matching rules.
# No separate matching section needed - profiles are "experts" on their miners.

# ============================================================================
# Global Defaults
# ============================================================================

defaults:
  timeout: 10
  retry_count: 2
  retry_delay: 1
  api_port: 4028
  credentials:
    username: "root"
    password: "root"
